<div class="scrape-result">
  <div class="scrape-result-icon">&#x2713;</div>
  <h2>Scrape complete!</h2>
  <p>{{ count }} {{ description }}</p>
  <div class="scrape-result-actions">
    <button
      class="scrape-result-btn primary"
      hx-get="/view/{{ view_path }}"
      hx-target="#main-content"
      hx-push-url="/view/{{ view_path }}"
    >
      View Results
    </button>
    <button
      class="scrape-result-btn"
      hx-get="/scrape"
      hx-target="#main-content"
      hx-push-url="false"
    >
      New Scrape
    </button>
  </div>
</div>
